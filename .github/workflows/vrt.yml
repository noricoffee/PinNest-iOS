name: Visual Regression Tests

# ヴィジュアルリグレッションテスト（swift-snapshot-testing）
# - main への PR で検証（pixel 比較）
# - 手動実行（workflow_dispatch）で mode=record にすると runner 環境で参照画像を
#   記録し直し、artifact としてアップロードする（→ ダウンロードしてコミットする）
#
# 注意: スナップショットはピクセル比較のため、参照画像は CI runner と同一環境で
# 記録したものを基準にする必要がある。初回は mode=record で記録 → コミットすること。
# シミュレータの iOS ランタイムは runner にインストール済みの最新を動的に使う
# （識別子をハードコードすると runner のパッチ版差異で "Invalid runtime" になるため）。

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "verify（検証）か record（参照画像を記録）"
        type: choice
        options: [verify, record]
        default: verify

concurrency:
  group: vrt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: macos-26
    env:
      SCHEME: pinNest
      DEVICE: iPhone 17 Pro
    steps:
      - uses: actions/checkout@v4

      # ローカル記録環境（Xcode 26.1 / iOS 26.1）に一致させる。
      # 最新 Xcode(26.5) は TCA 1.23.1 がコンパイルできない（Sendable エラー）ため使わない。
      - name: Select Xcode 26.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      # runner には iOS 26.1 ランタイムが無い場合がある（26.2/26.4/26.5 のみ）。
      # ローカル基準（26.1）に合わせるため明示的にインストールする。
      - name: Install iOS 26.1 runtime
        run: |
          set -euxo pipefail
          if ! xcrun simctl list runtimes | grep -q "iOS 26.1 "; then
            sudo xcodes runtimes install "iOS 26.1"
          fi
          xcrun simctl list runtimes | grep -i ios

      - name: Prepare simulator
        id: sim
        run: |
          set -euo pipefail
          # iOS 26.1 ランタイムを優先（無ければインストール済み最新にフォールバック）
          RUNTIME=$(xcrun simctl list runtimes \
            | grep -Eo 'com.apple.CoreSimulator.SimRuntime.iOS-26-1' | head -1 || true)
          if [ -z "$RUNTIME" ]; then
            RUNTIME=$(xcrun simctl list runtimes \
              | grep -Eo 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' \
              | sort -V | tail -1)
          fi
          echo "Using runtime: $RUNTIME"
          # 既存の対象デバイスがあれば再利用、無ければ作成（"Pro (" で Max 等を除外）
          UDID=$(xcrun simctl list devices \
            | grep "${DEVICE} (" \
            | grep -Eo '[0-9A-Fa-f-]{36}' | head -1 || true)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "${DEVICE}" "${DEVICE}" "$RUNTIME")
          fi
          echo "Simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project pinNest.xcodeproj -scheme "$SCHEME"

      - name: Run snapshot tests
        run: |
          set -o pipefail
          RECORD=""
          if [ "${{ github.event.inputs.mode }}" = "record" ]; then
            RECORD="SNAPSHOT_TESTING_RECORD=all"
          fi
          # -skipMacroValidation: SPM の Swift マクロ（TCA 等）の fingerprint 承認を
          # CI で自動的にスキップする（GUI の "Trust & Enable" 相当）
          env $RECORD xcodebuild test \
            -project pinNest.xcodeproj \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:pinNestTests/PinCardSnapshotTests \
            -only-testing:pinNestTests/ScreenSnapshotTests \
            -parallel-testing-enabled NO \
            -skipMacroValidation \
            -enableCodeCoverage NO \
            -resultBundlePath TestResults.xcresult

      # 失敗時: 参照/取得/差分画像を含む xcresult をアップロード（レビュー用）
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-xcresult
          path: TestResults.xcresult
          retention-days: 14
          if-no-files-found: ignore

      # record モード: runner 環境で記録した参照画像をアップロード（→ コミットする）
      # record では記録時に毎回「失敗」扱いになる（exit 70）ため always() で必ず実行する
      - name: Upload recorded snapshots
        if: ${{ always() && github.event.inputs.mode == 'record' }}
        uses: actions/upload-artifact@v4
        with:
          name: recorded-snapshots
          path: pinNestTests/Snapshot/__Snapshots__/
          retention-days: 14
          if-no-files-found: warn
